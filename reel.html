<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Highlight Reel</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'DM Sans', sans-serif;
    background:#FDFBF7;
    color:#0A192F;
}

#loader {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

#main {
    display:none;
    max-width:450px;
    margin:0 auto;
    padding:20px;
    text-align:center;
}

video {
    width:100%;
    border-radius:12px;
    background:#000;
}

.btn {
    display:block;
    margin-top:12px;
    padding:14px;
    border-radius:10px;
    background:linear-gradient(135deg,#0A192F,#0047AB);
    color:white;
    text-decoration:none;
    font-weight:700;
}
</style>
</head>

<body>

<div id="loader">Loading your reel...</div>

<div id="main">
    <h2 id="title"></h2>
    <video id="video" controls playsinline></video>
    <a id="download" class="btn">Download Video</a>
</div>

<script>
async function load() {
    const params = new URLSearchParams(window.location.search);
    let rawId = params.get('id');

    if (!rawId) {
        document.getElementById('loader').innerText = "❌ No ID in URL";
        return;
    }

    // CLEAN ID (this kills your previous bug permanently)
    const id = rawId.split(' ')[0].replace(/style.*/,'').trim();

    const TOKEN = 'YOUR_AIRTABLE_TOKEN';
    const BASE = 'appMDAS9DBPWtBiYZ';
    const TABLE = 'tblvqMOioHwGPLIik';

    const formula = encodeURIComponent(`{ID}="${id}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    try {
        const res = await fetch(url, {
            headers: { Authorization: `Bearer ${TOKEN}` }
        });

        const data = await res.json();

        if (!data.records || data.records.length === 0) {
            document.getElementById('loader').innerText = "❌ Reel not found";
            return;
        }

        const f = data.records[data.records.length - 1].fields;

        document.getElementById('title').innerText =
            (f['Charter Name'] || "YOUR REEL").toUpperCase();

        const videoUrl = f['Video URL'];

        if (videoUrl) {
            document.getElementById('video').src = videoUrl;

            let downloadUrl = videoUrl;
            if (downloadUrl.includes('cloudinary')) {
                downloadUrl = downloadUrl.replace('/upload/', '/upload/fl_attachment/');
            }

            document.getElementById('download').href = downloadUrl;

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        } else {
            document.getElementById('loader').innerText = "🎥 Still rendering...";
        }

    } catch (err) {
        document.getElementById('loader').innerText = "⚠️ Connection error";
    }
}

load();
</script>

</body>
</html>
