<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Video</title>

<meta property="og:type" content="website">
<meta property="og:title" content="Your Stay Video">
<meta property="og:description" content="Your stay, captured in a short highlight reel.">
<meta property="og:image" content="">
<meta property="og:url" content="">
<meta property="og:site_name" content="Rod2Reel">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root { --navy:#0A192F; --pearl:#FDFBF7; --accent:#E2E8F0; --yellow:#FFD700; }
* { box-sizing: border-box; }
body, html { height: 100%; margin: 0; background: var(--pearl); color: var(--navy); font-family: 'DM Sans', sans-serif; overflow: hidden; }

#loader { height: 100vh; display: flex; justify-content: center; align-items: center; font-weight: bold; }

#main { 
    display: none; 
    height: 100vh; 
    flex-direction: column; 
    padding: 15px 20px; 
    max-width: 400px; 
    margin: 0 auto;
    text-align: center;
}

.biz-name { 
    font-size: 18px; 
    font-weight: 900; 
    margin-bottom: 10px; 
    text-transform: uppercase; 
    flex-shrink: 0;
    width: 100%;
}

.content-area {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 8px;
}

.video-wrap { 
    width: 100%; 
    max-height: 50vh; 
    border-radius: 12px; 
    overflow: hidden; 
    background: #000; 
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    cursor: pointer; /* Shows it's clickable */
}
video { width: 100%; max-height: 50vh; object-fit: contain; display: block; }

.video-hint {
    font-size: 11px;
    font-weight: 500;
    color: var(--navy);
    opacity: 0.7;
    margin-bottom: 5px;
}

.btn { 
    width: 100%; 
    padding: 14px; 
    border-radius: 10px; 
    font-weight: 700; 
    font-size: 13px; 
    cursor: pointer; 
    display: block; 
    text-transform: uppercase; 
    text-decoration: none; 
    transition: 0.2s;
    text-align: center;
}

#reviewBtn { 
    background: var(--yellow); 
    color: #000; 
    border: 2px solid var(--yellow); 
    display: none; 
}

.btn-secondary { background: transparent; color: var(--navy); border: 2px solid var(--navy); }

.footer-main { 
    font-size: 8px; 
    padding: 10px 0; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    opacity: 0.6;
    flex-shrink: 0;
}
</style>
</head>

<body>

<div id="loader">GENERATING...</div>

<div id="main">
    <div id="bizName" class="biz-name"></div>

    <div class="content-area">
        <div class="video-wrap" onclick="toggleFull()">
            <video id="video" playsinline controls></video>
        </div>

        <div class="video-hint">TAP VIDEO TO ENLARGE</div>

        <a id="reviewBtn" class="btn" target="_blank">Leave Us A Review</a>
        <button class="btn btn-secondary" onclick="downloadVideo()">Download Reel</button>
        <a id="shareBtn" class="btn btn-secondary">Share</a>
    </div>

    <div class="footer-main">POWERED BY ROD2REEL</div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');
const TOKEN = 'patODjpFQhnsR92tl.5c80e0baa73a4b2099a83fead58c6cf8ac9811041b7077f031f95d5db82e8430';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

const video = document.getElementById('video');

// Fullscreen Logic for Mobile
function toggleFull() {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    } else if (video.webkitEnterFullscreen) {
        video.webkitEnterFullscreen();
    } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
    }
}

function setMeta(name, content) {
    let el = document.querySelector(`meta[property="${name}"]`);
    if (el) el.setAttribute('content', content);
}

async function load() {
    if (!id) return;
    const formula = encodeURIComponent(`OR({Video ID}="${id}", {lookupId}="${id}")`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    const data = await res.json();
    if (!data.records.length) return;

    const f = data.records[0].fields;
    let name = f['Charter Name'] || "Your Stay";
    name = Array.isArray(name) ? name[0] : name;
    document.getElementById('bizName').innerText = name.toUpperCase();

    const videoUrl = f['Video URL'];
    video.src = videoUrl;

    let thumb = videoUrl.replace('/upload/', '/upload/so_0,l_play-button,fl_layer_apply/').replace('.mp4', '.jpg');
    setMeta("og:title", name + " Video");
    setMeta("og:image", thumb);
    setMeta("og:url", window.location.href);

    let review = f['Review'] || f['GMB Review Link'];
    if (review) {
        document.getElementById('reviewBtn').href = Array.isArray(review) ? review[0] : review;
        document.getElementById('reviewBtn').style.display = 'block';
    }

    document.getElementById('shareBtn').href = `send.html?id=${id}`;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
}

function downloadVideo() {
    let url = video.src;
    url = url.replace('/upload/', '/upload/fl_attachment/');
    window.open(url, '_blank');
}

load();
</script>

</body>
</html>
