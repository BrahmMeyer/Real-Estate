<script>
const id = new URLSearchParams(window.location.search).get('id');
const TOKEN = 'patL3Q58sft42r9m6.edd9d972648dafe2db31136bfa425eb0b6e3399af91b05ab6a4a976c9bea24c9';
const BASE = 'appWx9LdS0uWdrRzL';
const TABLE = 'tblvUjEhTTiZU0pcI';

async function load() {
    if (!id) return;
    
    // 1. FIXED: Changed {formid} to {formId} (Capital I)
    // 2. Added SEARCH() so it can find the ID inside the Video URL if necessary
    const formula = encodeURIComponent(`OR({formId}="${id}", SEARCH("${id}", {Video URL}))`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();

        if (res.status === 422) {
            document.getElementById('loaderText').innerText = "FIELD NAME ERROR: Check Airtable Column Case";
            return;
        }

        if (!data.records || data.records.length === 0) {
            document.getElementById('loaderText').innerText = "STILL GENERATING...";
            return;
        }

        const f = data.records[0].fields;
        document.getElementById('bizName').innerText = (f['Charter Name'] || "YOUR REEL").toUpperCase();
        document.getElementById('video').src = f['Video URL'];
        document.getElementById('video').load();

        if (f['Review']) {
            document.getElementById('reviewBtn').href = Array.isArray(f['Review']) ? f['Review'][0] : f['Review'];
            document.getElementById('reviewBtn').style.display = 'block';
        }

        document.getElementById('shareBtn').href = `send.html?id=${id}`;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
    } catch (err) {
        document.getElementById('loaderText').innerText = "CONNECTION ERROR";
    }
}
load();
</script>
