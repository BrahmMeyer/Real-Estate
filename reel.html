<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter', sans-serif;
    background:#080808;
    color:#fff;
    text-align:center;
}

.container {
    max-width:500px;
    margin:0 auto;
    padding:20px;
}

video {
    width:100%;
    border-radius:16px;
    margin-bottom:20px;
}

.price {
    font-size:28px;
    font-weight:800;
    color:#b3b3b3;
    margin-bottom:20px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
}

.label {
    font-size:11px;
    color:#aaa;
    letter-spacing:1px;
    margin-bottom:5px;
}

.value {
    font-size:16px;
    font-weight:600;
}

.features {
    margin-top:15px;
}

.features h3 {
    font-size:12px;
    letter-spacing:2px;
    color:#b3b3b3;
}

.agent {
    margin-top:30px;
}

.agent img {
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

.button {
    display:block;
    margin:15px auto;
    padding:15px;
    width:80%;
    border-radius:12px;
    font-weight:700;
    text-decoration:none;
}

.call {
    background:#0A5C1A;
    color:#fff;
}

.save {
    background:#fff;
    color:#0A5C1A;
}

.footer {
    margin-top:30px;
    font-size:10px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

    <!-- VIDEO -->
    <video id="video" controls autoplay muted loop></video>

    <!-- PRICE -->
    <div class="price" id="price"></div>

    <!-- PROPERTY GRID -->
    <div class="grid">
        <div class="card">
            <div class="label">ACRES</div>
            <div class="value" id="acres"></div>
        </div>

        <div class="card">
            <div class="label">SQ FOOTAGE</div>
            <div class="value" id="sqft"></div>
        </div>

        <div class="card">
            <div class="label">BEDROOMS</div>
            <div class="value" id="beds"></div>
        </div>

        <div class="card">
            <div class="label">BATHROOMS</div>
            <div class="value" id="baths"></div>
        </div>
    </div>

    <!-- FEATURES INSIDE SAME BLOCK -->
    <div class="card features">
        <h3>SPECIAL FEATURES</h3>
        <div class="value" id="features"></div>
    </div>

    <!-- AGENT -->
    <div class="agent">
        <img id="agentPhoto" src="">
        <div id="owner"></div>
    </div>

    <!-- BUTTONS -->
    <a id="callBtn" class="button call">CALL AGENT</a>
    <a class="button save">SAVE LISTING</a>

    <!-- FOOTER -->
    <div class="footer">
        <div>POWERED BY ROD2REEL</div>
        <div>+27 (0)68 364 4061</div>
    </div>

</div>

<!-- JS MAPPING -->
<script>
const params = new URLSearchParams(window.location.search);

// TEXT
document.getElementById("price").innerText = params.get("price");
document.getElementById("acres").innerText = params.get("acres");
document.getElementById("sqft").innerText = params.get("sqft");
document.getElementById("beds").innerText = params.get("beds");
document.getElementById("baths").innerText = params.get("baths");
document.getElementById("features").innerText = params.get("features");
document.getElementById("owner").innerText = params.get("name");

// MEDIA
document.getElementById("video").src = params.get("video");
document.getElementById("agentPhoto").src = params.get("photo");

// CALL BUTTON
document.getElementById("callBtn").href = "tel:" + params.get("phone");
</script>

</body>
</html>
