<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Video</title>

    <!-- WhatsApp Preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Stay Video">
    <meta property="og:description" content="Your stay, captured in a short highlight reel.">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta property="og:site_name" content="Rod2Reel">

    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { --navy:#0A192F; --pearl:#FDFBF7; --accent:#E2E8F0; }
        body { background: var(--pearl); color: var(--navy); font-family: 'DM Sans', sans-serif; text-align: center; margin: 0; }
        #loader { height: 100vh; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        #main { display: none; padding: 40px 20px; }

        .biz-name { font-size: 24px; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; }

        .container { max-width: 400px; margin: auto; }
        .video-wrap { border-radius: 16px; overflow: hidden; margin-bottom: 20px; background: #000; border: 1px solid var(--accent); }
        video { width: 100%; display: block; }

        .btn { width: 100%; padding: 16px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; display: block; text-transform: uppercase; margin-bottom: 12px; }
        .btn-secondary { background: transparent; border: 2px solid var(--navy); }

        .footer-main { font-size: 9px; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>

<body>
<div id="loader">GENERATING...</div>

<div id="main">
    <div id="bizName" class="biz-name"></div>
    
    <div class="container">
        <div class="video-wrap">
            <video id="video" controls playsinline></video>
        </div>

        <button class="btn btn-secondary" onclick="downloadVideo()">Download Reel</button>

        <div class="footer-main">POWERED BY ROD2REEL</div>
    </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'patODjpFQhnsR92tl.5c80e0baa73a4b2099a83fead58c6cf8ac9811041b7077f031f95d5db82e8430';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

function setMeta(name, content) {
    let el = document.querySelector(`meta[property="${name}"]`);
    if (el) el.setAttribute('content', content);
}

async function load() {
    if (!id) return;

    const formula = encodeURIComponent(`OR({Video ID}="${id}", {lookupId}="${id}")`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    const data = await res.json();

    if (!data.records.length) return;

    const f = data.records[0].fields;

    let name = f['Charter Name'] || "Your Stay";
    name = Array.isArray(name) ? name[0] : name;

    document.getElementById('bizName').innerText = name.toUpperCase();

    const videoUrl = f['Video URL'];
    document.getElementById('video').src = videoUrl;

    // Thumbnail with play overlay
    let thumb = videoUrl
        .replace('/upload/', '/upload/so_0,l_play-button,fl_layer_apply/')
        .replace('.mp4', '.jpg');

    setMeta("og:title", name + " Video");
    setMeta("og:description", "Your stay, captured in a short highlight reel.");
    setMeta("og:image", thumb);
    setMeta("og:url", window.location.href);

    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display = 'block';
}

function downloadVideo() {
    let url = document.getElementById('video').src;
    url = url.replace('/upload/', '/upload/fl_attachment/');
    window.open(url, '_blank');
}

load();
</script>
</body>
</html>
