<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Reel</title>

<style>
:root { --navy:#0A192F; --pearl:#FDFBF7; }

body {
background: var(--pearl);
font-family: sans-serif;
text-align: center;
padding: 40px 20px;
margin: 0;
}

.card {
background: #fff;
padding: 30px;
border-radius: 20px;
max-width: 350px;
margin:auto;
box-shadow: 0 4px 15px rgba(0,0,0,0.05);
border: 1px solid #E2E8F0;
}

h2 { font-size: 18px; color: var(--navy); text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; }

input {
width:100%;
padding:15px;
margin-bottom:15px;
border-radius: 10px;
border: 1px solid #ddd;
box-sizing: border-box;
font-size: 16px;
}

.btn {
width:100%;
padding:15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
border: none;
font-weight: 700;
text-transform: uppercase;
transition: 0.2s;
}

.btn-wa { background: #25D366; color: white; }
.btn-sms { background: var(--navy); color: white; }
.btn:active { transform: scale(0.98); }
</style>
</head>

<body>

<div class="card">
    <h2>Share Your Reel</h2>

    <input id="input" type="tel" placeholder="Mobile Number (e.g. 082...)">

    <button class="btn btn-wa" onclick="send('wa')">WhatsApp</button>
    <button class="btn btn-sms" onclick="send('sms')">Text Message</button>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

function send(type) {
    const val = document.getElementById('input').value.trim();
    if (!val) {
        alert("Please enter a phone number");
        return;
    }

    let phone = val.replace(/\D/g,'');

    // Auto-formatting for South African numbers
    if (phone.length === 10 && phone.startsWith('0')) {
        phone = '27' + phone.substring(1);
    }

    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `Check out my highlight reel from our trip! ${link}`;

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        // SMS syntax works for both iOS and Android
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}
</script>

</body>
</html>
