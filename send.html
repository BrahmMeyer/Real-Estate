<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Reel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<style>
:root { --navy:#0A192F; --pearl:#FDFBF7; --border:#E2E8F0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--pearl); font-family: 'DM Sans', sans-serif; text-align: center; padding: 40px 20px; }
.card { background: #fff; padding: 30px; border-radius: 20px; max-width: 350px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); }
h2 { font-size: 18px; color: var(--navy); text-transform: uppercase; margin-bottom: 25px; font-weight: 900; letter-spacing: 1px; }
.btn { width: 100%; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: none; font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s ease; }
.btn:hover { opacity: 0.9; }
.btn-wa { background: #2D6A4F; }
.btn-fb { background: #4682B4; }
.btn-x { background: #1A202C; }
.btn-ig { background: #8B4513; }
.tooltip { display: none; background: #0A192F; color: #fff; font-size: 11px; padding: 10px 14px; border-radius: 8px; margin-top: -5px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.5; }
.tooltip.show { display: block; }
svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <h2>Share Your Reel</h2>
  <button class="btn btn-wa" onclick="shareWhatsApp()">WhatsApp</button>
  <a class="btn btn-fb" id="fbBtn" target="_blank">Share On Facebook</a>
  <a class="btn btn-x" id="xBtn" target="_blank">Share On X</a>
  <button class="btn btn-ig" onclick="saveForInstagram()">Save For Instagram</button>
  <div class="tooltip" id="igTooltip">Video saved — open Instagram and post from your gallery</div>
</div>
<script>
const id = new URLSearchParams(window.location.search).get('id');
const reelURL = `https://delivery.rod2reel.com/reel.html?id=${id}`;
const msg = `Check out my highlight reel: ${reelURL}`;
let videoURL = '';

async function getVideoURL() {
  if (videoURL) return videoURL;
  // FIXED: Pointing to Table 2
  const TOKEN = 'patN1QvygDdKNlLG3.550efc0913e840069b3dbb5fd7cecdc19074b7d813b5320469fe8ddf91b67411';
  const BASE = 'appWx9LdS0uWdrRzL';
  const TABLE = 'tblvUjEhTTiZU0pcI';
  const formula = encodeURIComponent(`OR({Video ID}="${id}", {formId}="${id}")`);
  const res = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`, {
    headers: { Authorization: `Bearer ${TOKEN}` }
  });
  const data = await res.json();
  if (data.records && data.records[0]) {
    videoURL = data.records[0].fields['Video URL'] || '';
  }
  return videoURL;
}

function shareWhatsApp() {
  window.location.href = `whatsapp://send?text=${encodeURIComponent(msg)}`;
}

document.getElementById('fbBtn').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(reelURL)}`;
document.getElementById('xBtn').href = `https://x.com/intent/tweet?text=${encodeURIComponent(msg)}`;

async function saveForInstagram() {
  const url = await getVideoURL();
  if (!url) return;
  const dlURL = url.includes('cloudinary') ? url.replace('/upload/', '/upload/fl_attachment/') : url;
  window.open(dlURL, '_blank');
  setTimeout(() => { document.getElementById('igTooltip').classList.add('show'); }, 1000);
}
</script>
</body>
</html>
