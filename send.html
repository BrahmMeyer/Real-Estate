<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Reel</title>
<style>
:root { --navy:#0A192F; --pearl:#FDFBF7; --blue-grad: linear-gradient(135deg, #0A192F 0%, #0047AB 100%); }
body { background: var(--pearl); font-family: sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
.card { background: #fff; padding: 30px; border-radius: 20px; max-width: 350px; margin:auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; }
h2 { font-size: 18px; color: var(--navy); text-transform: uppercase; margin-bottom: 25px; font-weight: 900; }
input { width:100%; padding:15px; margin-bottom:15px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; text-align: center; }
.btn { width:100%; padding:15px; border-radius:10px; margin-bottom:10px; cursor:pointer; border: none; font-weight: 700; text-transform: uppercase; color: white; background: var(--blue-grad); }
.btn-wa { background: #25D366; }
.helper-text { font-size: 10px; color: #718096; margin-top: -5px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="card">
    <h2>Share Your Reel</h2>
    <input id="input" type="tel" inputmode="tel" placeholder="Enter Mobile Number">
    
    <button class="btn btn-wa" onclick="send('wa')">WhatsApp</button>
    <div class="helper-text">PRESS CHANNEL BUTTON TO ACCESS YOUR CONTACTS</div>
    
    <button class="btn" onclick="send('sms')">Text Message</button>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

function send(type) {
    const val = document.getElementById('input').value.trim();
    if (!val) { alert("Please enter a number"); return; }
    let phone = val.replace(/\D/g,'');
    if (phone.length === 10 && phone.startsWith('0')) { phone = '27' + phone.substring(1); }

    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `Check out my highlight reel: ${link}`;

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}
</script>
</body>
</html>
