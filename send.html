<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Your Reel</title>

<style>
:root { --wa-green:#25D366; --text-blue:#0047AB; --navy:#0A192F; --pearl:#FDFBF7; }
body { background:var(--pearl); font-family:sans-serif; text-align:center; padding:40px; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
.card { background:#fff; padding:35px; border-radius:20px; border:1px solid #E2E8F0; max-width:350px; width:100%; }
h2 { text-transform:uppercase; font-size:16px; margin-bottom:25px; }
input { width:100%; padding:16px; margin-bottom:15px; border-radius:10px; border:1px solid #E2E8F0; text-align:center; }
.btn { width:100%; padding:16px; border-radius:10px; margin-bottom:12px; text-transform:uppercase; cursor:pointer; }
.btn-wa { border:2px solid var(--wa-green); }
.btn-sms { border:2px solid var(--text-blue); }
</style>
</head>

<body>
<div class="card">
<h2>Share Your Reel</h2>
<input id="input" placeholder="Enter Mobile Number">
<button class="btn btn-wa" onclick="send('wa')">Send via WhatsApp</button>
<button class="btn btn-sms" onclick="send('sms')">Send via Text</button>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'patODjpFQhnsR92tl.5c80e0baa73a4b2099a83fead58c6cf8ac9811041b7077f031f95d5db82e8430';
const BASE = 'appGGs07d4FB6htwg';
const TABLE = 'tblCYkMaAOHrX0nwN';

let charterName = "My Stay";

async function loadName() {
    const formula = encodeURIComponent(`OR({Video ID}="${id}", {lookupId}="${id}")`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    const data = await res.json();

    if (data.records.length) {
        charterName = data.records[0].fields['Charter Name'] || "My Stay";
    }
}

function send(type) {
    const phone = document.getElementById('input').value.replace(/\D/g,'');
    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `My stay at ${charterName}: ${link}`;

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}

loadName();
</script>
</body>
</html>
