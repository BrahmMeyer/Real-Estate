<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Reel</title>
    <style>
        :root { --navy:#0A192F; --pearl:#FDFBF7; }
        body { background: var(--pearl); font-family: sans-serif; text-align: center; padding: 40px; }
        .card { background: #fff; padding: 30px; border-radius: 20px; max-width: 350px; margin:auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width:100%; padding:15px; margin-bottom:15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { width:100%; padding:15px; border-radius:10px; margin-bottom:10px; cursor:pointer; font-weight: bold; border: none; background: var(--navy); color: white; text-transform: uppercase; }
        .btn-wa { background: #25D366; }
    </style>
</head>
<body>

<div class="card">
    <h2>Share Your Reel</h2>
    <input id="input" type="tel" placeholder="Enter Mobile Number">
    <button class="btn btn-wa" onclick="send('wa')">WhatsApp</button>
    <button class="btn" onclick="send('sms')">Text</button>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

function send(type) {
    const val = document.getElementById('input').value.trim();
    if (!val) return;

    let phone = val.replace(/\D/g,'');
    
    // Auto-prefix for SA if needed
    if (phone.length === 10 && phone.startsWith('0')) {
        phone = '27' + phone.substring(1);
    }

    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `Check out my highlight reel: ${link}`;

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}
</script>
</body>
</html>
