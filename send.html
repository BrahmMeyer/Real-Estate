<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Share Your Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy:#0A192F; 
            --pearl:#FDFBF7; 
            --whatsapp: #4A5D4E; /* Restored Muted Safari Green */
            --facebook: #3B4A6B; /* Restored Muted Navy */
            --instagram: #8C6A5E; /* Restored Copper/Brown */
            --x-corp: #2C2C2C; /* Restored Dark Grey */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--pearl); font-family: 'DM Sans', sans-serif; text-align: center; padding: 60px 20px; color: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
        .button-stack { width: 100%; max-width: 320px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; cursor: pointer; border: none; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #fff; display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; transition: opacity 0.2s; }
        .btn-wa { background: var(--whatsapp); }
        .btn-fb { background: var(--facebook); }
        .btn-x { background: var(--x-corp); }
        .btn-ig { background: var(--instagram); }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        .btn:active { opacity: 0.8; transform: translateY(1px); }
        .footer-info { margin-top: 50px; font-size: 8px; opacity: 0.6; letter-spacing: 1px; font-weight: 700; text-transform: uppercase; line-height: 1.6; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="button-stack">
        <button class="btn btn-wa" onclick="shareWhatsApp()">Send via WhatsApp</button>
        <button class="btn btn-fb" onclick="shareSocial('Facebook')">Post to Facebook</button>
        <button class="btn btn-x" onclick="shareSocial('X')">Post to X</button>
        <button id="igBtn" class="btn btn-ig" onclick="saveForInstagram()">Save for Instagram</button>
    </div>
    <div class="footer-info">STAY2REEL<br>+27 (0) 68 364 4061<br>listings2reels@gmail.com</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id')?.split(' ')[0].trim();
const TOKEN = 'patcg5qiA5GY0C9dG.99f8e22ce623b22372b0654d341ee3d6164160d11e591f28d7d4d26b76ea2589';
const BASE = 'appMDAS9DBPWtBiYZ';
const TABLE = 'tblvqMOioHwGPLIik';

async function fetchLatestVideo() {
    if (!id) return null;
    const formula = encodeURIComponent(`{Video ID}="${id}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}&sort[0][field]=Created&sort[0][direction]=desc&cb=${Date.now()}`;
    try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();
        return data.records?.[0]?.fields || null;
    } catch (e) { return null; }
}

function shareWhatsApp() {
    const msg = `Check out my reel: https://delivery.rod2reel.com/reel.html?id=${id}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function shareSocial(platform) {
    const reelURL = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const text = "Check out my safari highlight reel!";
    let shareUrl = "";
    if (platform === 'Facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(reelURL)}&quote=${encodeURIComponent(text)}`;
    if (platform === 'X') shareUrl = `https://x.com/intent/tweet?url=${encodeURIComponent(reelURL)}&text=${encodeURIComponent(text)}`;
    window.open(shareUrl, '_blank');
}

async function saveForInstagram() {
    const btn = document.getElementById('igBtn');
    btn.disabled = true;
    const originalText = btn.innerText;
    btn.innerText = "PREPARING...";
    
    const fields = await fetchLatestVideo();
    if (fields && fields['Video URL']) {
        try {
            const response = await fetch(fields['Video URL']);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "SafariReel.mp4";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        } catch (e) {
            window.open(fields['Video URL'], '_blank');
        }
    } else {
        alert("Video loading... please wait 5 seconds.");
    }
    btn.innerText = originalText;
    btn.disabled = false;
}
</script>
</body>
</html>
