<script>
const id = new URLSearchParams(window.location.search).get('id');
const TOKEN = 'patcg5qiA5GY0C9dG.99f8e22ce623b22372b0654d341ee3d6164160d11e591f28d7d4d26b76ea2589';
const BASE = 'appMDAS9DBPWtBiYZ';
const TABLE = 'tblvqMOioHwGPLIik';

async function saveForInstagram() {
    const formula = encodeURIComponent(`TRIM({formId})="${id.trim()}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;
    try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();
        if (data.records && data.records.length > 0) {
            let vUrl = data.records[0].fields['Video URL'];
            if (vUrl.includes('cloudinary')) vUrl = vUrl.replace('/upload/', '/upload/fl_attachment/');
            window.open(vUrl, '_blank');
        }
    } catch (err) { console.error(err); }
}
</script>
