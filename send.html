<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Reel</title>

<style>
:root { --navy:#0A192F; --pearl:#FDFBF7; }

body {
background: var(--pearl);
font-family: sans-serif;
text-align: center;
padding: 40px;
}

.card {
background: #fff;
padding: 30px;
border-radius: 20px;
max-width: 350px;
margin:auto;
}

input {
width:100%;
padding:15px;
margin-bottom:15px;
}

.btn {
width:100%;
padding:15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Share Your Reel</h2>

    <input id="input" type="tel" placeholder="Enter Mobile Number">

    <button class="btn" onclick="send('wa')">WhatsApp</button>
    <button class="btn" onclick="send('sms')">Text</button>
</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

function send(type) {

    const val = document.getElementById('input').value.trim();
    if (!val) return;

    let phone = val.replace(/\D/g,'');

    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;

    const msg = `My stay: ${link}`;

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}
</script>

</body>
</html>
