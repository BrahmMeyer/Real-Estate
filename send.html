<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Reel</title>
    <style>
        :root { --wa-green: #25D366; --text-blue: #0047AB; --navy: #0A192F; --pearl: #FDFBF7; }
        body { background: var(--pearl); color: var(--navy); font-family: sans-serif; text-align: center; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 35px; border-radius: 20px; border: 1px solid #E2E8F0; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        h2 { color: var(--navy); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-size: 16px; font-weight: 800; }
        input { padding: 16px; width: 100%; border-radius: 10px; border: 1px solid #E2E8F0; background: #fff; color: #000; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; background: transparent; color: #000; font-weight: bold; cursor: pointer; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .btn-wa { border: 2px solid var(--wa-green); }
        .btn-sms { border: 2px solid var(--text-blue); }
    </style>
</head>

<body>
    <div class="card">
        <h2>Share Your Reel</h2>
        <input id="input" type="tel" placeholder="Enter Mobile Number" autocomplete="off">
        <button class="btn btn-wa" onclick="send('wa')">Send via WhatsApp</button>
        <button class="btn btn-sms" onclick="send('sms')">Send via Text</button>
    </div>

<script>
const id = new URLSearchParams(window.location.search).get('id');

const TOKEN = 'YOUR_TOKEN';
const BASE = 'YOUR_BASE';
const TABLE = 'YOUR_TABLE';

let charterName = "My Stay";

async function loadName() {
    if (!id) return;

    try {
        const formula = encodeURIComponent(`OR({Video ID}="${id}", {lookupId}="${id}")`);
        const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

        const res = await fetch(url, {
            headers: { Authorization: `Bearer ${TOKEN}` }
        });

        const data = await res.json();

        if (data.records && data.records.length > 0) {
            let name = data.records[0].fields['Charter Name'] || data.records[0].fields['Business Name'];
            charterName = Array.isArray(name) ? name[0] : name || "My Stay";
        }

    } catch (e) {
        console.error(e);
    }
}

function send(type) {
    const val = document.getElementById('input').value.trim();
    if (!val) return;

    const link = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `My stay at ${charterName}: ${link}`;

    let phone = val.replace(/\D/g, '');

    if (type === 'wa') {
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
        window.location.href = `sms:${phone}?&body=${encodeURIComponent(msg)}`;
    }
}

loadName();
</script>

</body>
</html>
