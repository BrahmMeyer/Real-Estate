<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Save Your Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy:#0A192F; --pearl:#FDFBF7; --accent:#E2E8F0; --blue-grad: linear-gradient(135deg, #0A192F 0%, #0047AB 100%); }
        * { box-sizing: border-box; }
        body, html { height: 100%; margin: 0; background: var(--pearl); color: var(--navy); font-family: 'DM Sans', sans-serif; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        h1 { font-size: 22px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; max-width: 300px; line-height: 1.5; }
        .btn { width: 100%; max-width: 300px; padding: 18px; border-radius: 12px; font-weight: 700; font-size: 14px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; text-decoration: none; border: none; font-family: 'DM Sans', sans-serif; background: var(--blue-grad); color: #fff; box-shadow: 0 10px 20px rgba(10, 25, 47, 0.2); transition: transform 0.2s; }
        .btn:active { transform: scale(0.98); }
        .footer { position: absolute; bottom: 20px; font-size: 10px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>READY TO SHARE?</h1>
    <p>Tap the button below to save your reel to your device for Instagram, TikTok, or Facebook.</p>
    
    <button id="shareBtn" class="btn">SAVE TO DEVICE</button>

    <div class="footer">ROD2REEL</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

const TOKEN = 'patcg5qiA5GY0C9dG.99f8e22ce623b22372b0654d341ee3d6164160d11e591f28d7d4d26b76ea2589';
const BASE = 'appMDAS9DBPWtBiYZ';
const TABLE = 'tblvqMOioHwGPLIik';

async function saveForInstagram() {
    if (!id) {
        alert("No ID found in URL");
        return;
    }

    // Clean ID logic
    const cleanId = id.split(' ')[0].split('style')[0].trim();
    
    // Changing button state to show it's working
    const btn = document.getElementById('shareBtn');
    const originalText = btn.innerText;
    btn.innerText = "PREPARING DOWNLOAD...";
    btn.style.opacity = "0.5";

    const formula = encodeURIComponent(`{ID}="${cleanId}"`);
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${formula}`;

    try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();

        if (data.records && data.records.length > 0) {
            const f = data.records[data.records.length - 1].fields;
            let vUrl = f['Video URL'];

            if (vUrl && vUrl.includes('cloudinary')) {
                vUrl = vUrl.replace('/upload/', '/upload/fl_attachment/');
                window.open(vUrl, '_blank');
                btn.innerText = "DOWNLOAD STARTED";
            } else {
                alert("Video not ready yet.");
                btn.innerText = originalText;
            }
        } else {
            alert("Record not found.");
            btn.innerText = originalText;
        }
    } catch (err) {
        alert("Error connecting to server.");
        btn.innerText = originalText;
    }
    btn.style.opacity = "1";
}

// Attach function to the button
document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('shareBtn');
    if (btn) {
        btn.onclick = saveForInstagram;
    }
});
</script>

</body>
</html>
