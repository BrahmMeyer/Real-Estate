<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Share Your Reel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy:#0A192F; 
            --pearl:#FDFBF7; 
            --whatsapp: #4A5D4E; 
            --facebook: #3B4A6B; 
            --instagram: #8C6A5E; 
            --x-corp: #2C2C2C; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--pearl); 
            font-family: 'DM Sans', sans-serif; 
            text-align: center; 
            padding: 60px 20px 40px 20px; 
            color: var(--navy); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        .button-stack { 
            width: 100%; 
            max-width: 320px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex-grow: 1; 
        }
        
        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: none; 
            font-weight: 700; 
            font-size: 12px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            text-decoration: none; 
            transition: opacity 0.2s; 
        }
        
        .btn-wa { background: var(--whatsapp); }
        .btn-fb { background: var(--facebook); }
        .btn-x { background: var(--x-corp); }
        .btn-ig { background: var(--instagram); }
        
        .btn:active { opacity: 0.8; transform: translateY(1px); }
        svg { width: 18px; height: 18px; fill: #fff; }
        
        .footer-info { 
            margin-top: 50px; 
            font-size: 8px; 
            opacity: 0.6; 
            letter-spacing: 1px; 
            font-weight: 700; 
            text-transform: uppercase; 
            line-height: 1.6; 
            padding-bottom: 20px; 
        }
    </style>
</head>
<body>

    <div class="button-stack">
        <button class="btn btn-wa" onclick="shareWhatsApp()">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

        <button class="btn btn-x" onclick="shareSocial('X')">

            Save for Instagram
        </button>
    </div>

    <div class="footer-info">
        STAY2REEL<br>
        +27 (0) 68 364 4061<br>
        listings2reels@gmail.com
    </div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get('id');

const TOKEN = 'patcg5qiA5GY0C9dG.99f8e22ce623b22372b0654d341ee3d6164160d11e591f28d7d4d26b76ea2589';
const BASE = 'appMDAS9DBPWtBiYZ';
const TABLE = 'tblvqMOioHwGPLIik';

// Helper: Always fetch the most recent entry for this ID
async function fetchLatestVideo() {
    if (!id) return null;
    const cleanId = id.split(' ')[0].trim();
    // Cache bust + sorting by Created Descending
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula={ID}="${cleanId}"&sort[0][field]=Created&sort[0][direction]=desc&cb=${Date.now()}`;
    
    try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
        const data = await res.json();
        return data.records && data.records.length > 0 ? data.records[0].fields : null;
    } catch (e) {
        return null;
    }
}

function shareWhatsApp() {
    const reelURL = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const msg = `Check out my reel: ${reelURL}`;
    window.location.href = `whatsapp://send?text=${encodeURIComponent(msg)}`;
}

function shareSocial(platform) {
    const reelURL = `https://delivery.rod2reel.com/reel.html?id=${id}`;
    const text = encodeURIComponent("Check out this highlight reel! 🎣");
    
    let shareUrl = "";
    if (platform === 'Facebook') {
        shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(reelURL)}`;
    }
    if (platform === 'X') {
        shareUrl = `https://x.com/intent/tweet?url=${encodeURIComponent(reelURL)}&text=${text}`;
    }
    
    window.open(shareUrl, '_blank');
}

async function saveForInstagram() {
    const fields = await fetchLatestVideo();
    if (fields && fields['Video URL']) {
        // Force the download attachment
        let vUrl = fields['Video URL'].replace('/upload/', '/upload/fl_attachment/');
        window.open(vUrl, '_blank');
    } else {
        alert("Video still processing... try again in 30 seconds.");
    }
}
</script>
</body>
</html>
